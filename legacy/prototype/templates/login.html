<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSpend | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(45deg, #000, #121212);
            color: #FFF;
        }

        .header, .topnav {
            padding: 1rem;
            background: rgba(0, 0, 0, 0.9);
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            color: #E91E63;
        }

        h2 {
            text-align: center;
            font-size: 1.5rem;
            color: #FFEB3B;
        }

        .topnav {
            display: flex;
            justify-content: space-between;
        }

        .topnav a {
            color: #FF5722;
            text-decoration: none;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            transition: all 0.3s ease-in-out;
        }

        .topnav a:hover {
            background: rgba(255, 255, 255, 0.2);
            color: #FFF;
        }

        .login {
            width: 100%;
            max-width: 400px;
            margin: 5% auto;
            background: rgba(0, 0, 0, 0.8);
            padding: 2rem;
            border-radius: 10px;
        }

        input {
            background-color: rgba(255, 255, 255, 0.2);
            color: #FFF;
            border: 1px solid #FFEB3B;
            padding: 0.75rem;
            width: 100%;
            border-radius: 10px;
            margin-bottom: 1rem;
            transition: all 0.3s ease-in-out;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 10px #FFEB3B;
        }

        button {
            background: linear-gradient(90deg, #FF3366, #E91E63); /* Gradient background */
            border: none;
            color: #FFF;
            padding: 0.75rem 2rem;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase; /* Uppercase text */
            box-shadow: 0 5px 10px rgba(0, 0, 0, 0.1); /* Drop shadow */
            transition: all 0.3s ease-in-out;
        }
        
        button:hover {
            background: linear-gradient(90deg, #FF5722, #FF4512); /* Updated gradient on hover */
            transform: scale(1.05); /* Scale up slightly on hover */
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); /* More pronounced shadow on hover */
        }
        
        

    </style>
</head>

<body>
    <div class="topnav">
        <a href='/home'><i class="fas fa-arrow-left"></i> Home</a>
        <a href='/register'><i class="fas fa-user-plus"></i> Register</a>
    </div>
    

    <div class="header">
        <h1>LOGIN</h1>
    </div>

    <div class="login">
        <h2>Sign in to continue!</h2>
        <form method="POST">
            <input type="text" name="USERNAME" placeholder="Username" required="required" />
            <input type="password" name="PASSWORD" placeholder="Password" required="required" />
            <button type="submit" class="btn btn-primary btn-block btn-large"><i class="fas fa-sign-in-alt"></i> LOGIN</button>

        </form>
    </div>
</body>
</html>
