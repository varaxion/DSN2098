<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSpend | Login</title>
    <style>
        body {
            margin: 0;
            background-color: rgb(24, 24, 24); 
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h2 {
            font-size: 2rem;
            color: rgb(255, 145, 0);
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255, 145, 0, 0.5);
            padding-bottom: 10px;
        }

        form {
            margin: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            background: linear-gradient(45deg, rgb(0, 255, 255), rgb(0, 255, 85));
            border: none;
            color: rgb(24, 24, 24);
            padding: 15px 25px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.4);
            transition: all 0.3s;
            cursor: pointer;
        }

        button:hover {
            background: linear-gradient(45deg, rgb(0, 255, 85), rgb(0, 255, 255));
            transform: scale(1.05);
        }

        @media screen and (max-width: 768px) {
            h2 {
                font-size: 1.5rem;
            }
            button {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }

    </style>
</head>

<body>

    <h2>Select an Option</h2>

    <!-- Form for adding expenses -->
    <form action="/add_expenses" method="post">
        <button type="submit" id="addExpense">Expense Entry</button>
    </form>

    <!-- Form for displaying expenditure -->
    <form action="/disp_expend" method="post">
        <button type="submit" id="displayExpenditure">Display Expenditure</button>
    </form>

</body>

</html>
